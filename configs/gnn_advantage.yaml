seed: 42
device: cpu

experiment:
  name: gnn_advantage
  output_dir: outputs
  eval_episodes: 20

env:
  action_type: continuous_mix
  episode_length: 72
  num_devices: 10
  num_servers: 3
  max_links_per_device: 2
  time_weight: 4.0
  energy_weight: 1.0
  failure_penalty: 3.0
  task:
    avg_load_bits: 1350.0
    load_std_bits: 220.0
    avg_cpu_cycle_per_bit: 737.5
  wireless:
    gaussian_channel_noise: 1.0
    effective_capacitance_coefficient: 1.0e-27
  server_dynamics:
    enabled: true
    bandwidth_jitter: 0.18
    cpu_jitter: 0.2
  link_dynamics:
    enabled: true
    init_low: 0.5
    init_high: 1.8
    noise_std: 0.10
  devices:
    - priority: 3
      cpu_frequency: 1.7
      max_process_delay: 0.9
      max_load_capacity: 7000.0
      max_process_load_per_slot: 1700.0
      energy_consume_per_ms: 1.1
      transmission_power: 2.0
      channel_gain: 8.0
      count: 3
    - priority: 2
      cpu_frequency: 1.5
      max_process_delay: 0.85
      max_load_capacity: 6500.0
      max_process_load_per_slot: 1450.0
      energy_consume_per_ms: 1.1
      transmission_power: 2.0
      channel_gain: 7.5
      count: 4
    - priority: 1
      cpu_frequency: 1.35
      max_process_delay: 0.8
      max_load_capacity: 6200.0
      max_process_load_per_slot: 1250.0
      energy_consume_per_ms: 1.1
      transmission_power: 2.0
      channel_gain: 7.0
      count: 3
  servers:
    - bandwidth: 13.0
      max_cpu_frequency: 10.0
      count: 1
    - bandwidth: 10.0
      max_cpu_frequency: 8.0
      count: 1
    - bandwidth: 8.0
      max_cpu_frequency: 7.0
      count: 1
  continuous_target_server_index: 0

train:
  total_updates: 100
  steps_per_update: 320
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  learning_rate: 3.0e-4
  max_grad_norm: 0.5
  epochs: 4
  minibatch_size: 64

model:
  name: gnn
  hidden_dim: 96
  gnn_layers: 3
  dropout: 0.05
